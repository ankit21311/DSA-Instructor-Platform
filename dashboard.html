<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ankit DSA</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .table-dark {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text-light);
            --bs-table-border-color: rgba(255, 255, 255, 0.1);
        }

        .table-dark th {
            color: var(--text-muted);
            font-weight: 500;
        }
    </style>
</head>

<body class="dark-theme">
    <nav class="navbar navbar-dark bg-darker border-bottom border-secondary"
        style="border-color: rgba(255,255,255,0.1) !important;">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">&lt;Ankit.dsa/&gt; <span
                    class="badge bg-primary text-dark ms-2 align-middle">Admin</span></a>
            <button class="btn btn-outline-light btn-sm rounded-pill px-3" id="logoutBtn">Logout</button>
        </div>
    </nav>
    <div class="container-fluid py-4 px-4">
        <!-- Stats Row -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="glass-card p-4 rounded-4">
                    <h6 class="text-muted mb-2">Total Leads</h6>
                    <h2 class="fw-bold mb-0 text-primary" id="stat-total">-</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card p-4 rounded-4">
                    <h6 class="text-muted mb-2">Today's Leads</h6>
                    <h2 class="fw-bold mb-0 text-white" id="stat-today">-</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card p-4 rounded-4">
                    <h6 class="text-muted mb-2">This Month</h6>
                    <h2 class="fw-bold mb-0 text-white" id="stat-month">-</h2>
                </div>
            </div>
        </div>
        <!-- Leads Table -->
        <div class="glass-card p-4 rounded-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="mb-0 fw-bold">Recent Inquiries</h5>
                <div class="d-flex gap-2">
                    <input type="text"
                        class="form-control form-control-sm bg-dark border-secondary text-light rounded-pill px-3"
                        id="searchInput" placeholder="Search name or email...">
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Contact</th>
                            <th>Education</th>
                            <th>Target Co.</th>
                            <th>Message</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leadsTableBody">
                        <tr>
                            <td colspan="7" class="text-center py-4 text-muted">Loading leads...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <!-- View Message Modal -->
    <div class="modal fade" id="messageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border-secondary text-light glass-card">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalName">Message Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="small text-muted mb-1">Message:</p>
                    <div id="modalMessage" class="p-3 bg-darker rounded mb-3"></div>
                    <div class="row small">
                        <div class="col-6">
                            <p class="text-muted mb-1">Email:</p>
                            <p id="modalEmail" class="mb-0"></p>
                        </div>
                        <div class="col-6">
                            <p class="text-muted mb-1">Phone:</p>
                            <p id="modalPhone" class="mb-0"></p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Close</button>
                    <a href="#" id="modalMailto" class="btn btn-primary rounded-pill">Reply via Email</a>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/admin.js"></script>
</body>

</html>
