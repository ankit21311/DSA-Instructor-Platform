<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Ankit DSA</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="dark-theme d-flex align-items-center justify-content-center"
    style="min-height: 100vh; background-color: var(--bg-darker);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-white">&lt;Ankit.dsa/&gt;</h2>
                    <p class="text-muted">Admin Portal</p>
                </div>
                <div class="glass-card p-4 rounded-4">
                    <form id="login-form">
                        <div id="login-error" class="alert alert-danger d-none small py-2" role="alert"></div>
                        <div class="mb-3">
                            <label class="form-label text-light small">Email address</label>
                            <input type="email" class="form-control bg-dark border-secondary text-light" id="email"
                                required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-light small">Password</label>
                            <input type="password" class="form-control bg-dark border-secondary text-light"
                                id="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold rounded-pill" id="loginBtn">Login to
                            Dashboard</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/admin.js"></script>
</body>

</html>
